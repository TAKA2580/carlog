<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CarLog">
  <link rel="manifest" href="manifest.json">
  <title>CarLog</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --amber:#f59e0b;--amber-dim:rgba(245,158,11,.1);--amber-glow:rgba(245,158,11,.22);
      --surface:#0e0e10;--surface2:#18181b;--surface3:#27272a;
      --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.03);
      --text:#fafafa;--text2:#a1a1aa;--text3:#52525b;
      --red:#f43f5e;--green:#22c55e;--cyan:#22d3ee;
      --sidebar-w:224px;
    }
    html{font-size:16px;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
    body{background:#000;color:var(--text);font-family:'Inter','Noto Sans JP',system-ui,sans-serif}
    #root{min-height:100vh}
    .spin{width:36px;height:36px;border:2.5px solid var(--surface3);border-top-color:var(--amber);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 14px}
    @keyframes sp{to{transform:rotate(360deg)}}
    #loading{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px}

    /* App shell */
    .app-shell{min-height:100vh;background:#000;color:var(--text);font-family:'Inter','Noto Sans JP',system-ui,sans-serif}
    .main-content{padding-bottom:76px}

    /* Sidebar (desktop only) */
    .sidebar{display:none}
    @media(min-width:768px){
      .sidebar{
        display:flex;flex-direction:column;
        position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);
        background:rgba(7,7,9,.98);
        border-right:1px solid var(--border);
        z-index:90;padding:22px 14px 28px;
      }
      .main-content{margin-left:var(--sidebar-w);padding-bottom:28px}
      .bottom-nav{display:none!important}
      .header-logo{display:none!important}
      .header-mileage{display:none!important}
    }
    .sidebar-logo{display:flex;align-items:center;gap:11px;padding:2px 10px 20px;margin-bottom:6px;border-bottom:1px solid var(--border)}
    .sidebar-logo-icon{width:36px;height:36px;background:var(--amber);border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 12px rgba(245,158,11,.3)}
    .sidebar-logo-text{font-weight:700;font-size:15px;letter-spacing:-.4px}
    .sidebar-logo-sub{font-size:10px;color:var(--text3);margin-top:2px;line-height:1.4}
    .sidebar-nav{display:flex;flex-direction:column;gap:2px;margin-top:14px;flex:1}
    .sidebar-item{
      display:flex;align-items:center;gap:12px;
      padding:11px 14px;border-radius:12px;
      cursor:pointer;border:none;background:none;
      color:var(--text3);font-size:13px;font-weight:500;
      transition:background .15s,color .15s;width:100%;text-align:left;letter-spacing:-.1px
    }
    .sidebar-item.active{background:rgba(245,158,11,.09);color:var(--amber);font-weight:600}
    .sidebar-item:hover:not(.active){background:rgba(255,255,255,.04);color:var(--text2)}
    .sidebar-item svg{flex-shrink:0}
    .sidebar-footer{padding:18px 10px 0;border-top:1px solid var(--border);margin-top:auto}
    .sidebar-footer-stat{font-size:10px;color:var(--text3);letter-spacing:.4px;text-transform:uppercase;margin-bottom:5px}
    .sidebar-footer-val{font-family:'DM Mono',monospace;font-size:24px;font-weight:700;color:var(--amber);letter-spacing:-1.5px;line-height:1}
    .sidebar-footer-sub{font-size:10px;color:var(--text3);margin-top:4px}

    /* Bottom nav (mobile) */
    .bottom-nav{
      position:fixed;bottom:0;left:0;right:0;
      background:rgba(0,0,0,.92);
      backdrop-filter:blur(28px) saturate(2);
      -webkit-backdrop-filter:blur(28px) saturate(2);
      border-top:1px solid var(--border);
      z-index:90;display:flex;justify-content:space-around;
      padding:6px 0 max(8px,env(safe-area-inset-bottom))
    }
    .nav-item{
      display:flex;flex-direction:column;align-items:center;gap:3px;
      padding:5px 8px;cursor:pointer;border:none;background:none;
      color:var(--text3);font-size:9px;font-weight:500;letter-spacing:.3px;
      transition:color .2s;flex:1;min-width:0
    }
    .nav-item.active{color:var(--amber)}
    .nav-item svg{transition:transform .18s}
    .nav-item.active svg{transform:scale(1.12)}
    .nav-item.active::after{content:'';display:block;width:4px;height:4px;border-radius:50%;background:var(--amber);margin:-1px auto 0}

    /* App header */
    .app-header{
      background:rgba(0,0,0,.88);
      backdrop-filter:blur(24px) saturate(1.8);
      -webkit-backdrop-filter:blur(24px) saturate(1.8);
      border-bottom:1px solid var(--border);
      padding:0 18px;position:sticky;top:0;z-index:80
    }
    @media(min-width:768px){.app-header{padding:0 28px}}

    /* Cards */
    .crd{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:18px}
    @media(min-width:768px){.crd{padding:22px;border-radius:22px}}
    .crd-sm{background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:14px}
    .row{border-bottom:1px solid var(--border2)}
    .row:last-child{border-bottom:none}

    /* Hero */
    .hero{
      background:linear-gradient(145deg,#150d00 0%,#0b0700 55%,#111113 100%);
      border:1px solid rgba(245,158,11,.15);
      border-radius:24px;padding:24px;position:relative;overflow:hidden
    }
    .hero::before{
      content:'';position:absolute;top:-70px;right:-70px;
      width:280px;height:280px;
      background:radial-gradient(circle,rgba(245,158,11,.16) 0%,transparent 65%);
      pointer-events:none
    }
    .hero::after{
      content:'';position:absolute;bottom:-50px;left:-30px;
      width:180px;height:180px;
      background:radial-gradient(circle,rgba(245,158,11,.06) 0%,transparent 65%);
      pointer-events:none
    }

    /* Sheet / Modal */
    .overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.82);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      z-index:100;display:flex;align-items:flex-end;justify-content:center;
      animation:ov-in .18s ease
    }
    @media(min-width:600px){.overlay{align-items:center}}
    @keyframes ov-in{from{opacity:0}to{opacity:1}}
    .sheet{
      background:var(--surface2);border:1px solid var(--border);
      border-radius:28px 28px 0 0;
      padding:10px 20px 36px;width:100%;max-width:540px;max-height:93vh;overflow-y:auto;
      animation:sheet-spring .34s cubic-bezier(.34,1.4,.64,1)
    }
    @media(min-width:600px){.sheet{border-radius:22px;padding:28px}}
    @keyframes sheet-spring{from{transform:translateY(110%)}to{transform:translateY(0)}}
    .drag-handle{width:40px;height:4px;background:var(--surface3);border-radius:2px;margin:8px auto 20px}

    /* Buttons */
    .btn-primary{
      background:var(--amber);color:#000;border:none;border-radius:12px;
      padding:12px 20px;font-weight:700;cursor:pointer;font-size:14px;
      display:flex;align-items:center;gap:7px;
      transition:transform .12s,box-shadow .12s;
      box-shadow:0 3px 14px rgba(245,158,11,.3)
    }
    .btn-primary:active{transform:scale(.96)}
    .btn-primary:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
    .btn-ghost{
      background:transparent;border:1px solid var(--border);color:var(--text2);
      border-radius:10px;padding:10px 16px;cursor:pointer;font-size:13px;
      transition:background .15s,border-color .15s
    }
    .btn-ghost:hover{background:rgba(255,255,255,.04)}
    .btn-ghost:active{background:var(--surface3)}
    .btn-icon{
      background:none;border:none;cursor:pointer;
      padding:7px;color:var(--text3);border-radius:10px;
      transition:background .12s,color .12s;display:flex;align-items:center;justify-content:center
    }
    .btn-icon:hover{background:rgba(255,255,255,.05);color:var(--text2)}
    .btn-icon:active{background:var(--surface3);color:var(--text)}

    /* Quick action buttons */
    .quick-btn{
      background:var(--surface2);border:1px solid var(--border);
      border-radius:18px;padding:18px 14px;cursor:pointer;
      display:flex;flex-direction:column;align-items:center;gap:9px;
      transition:background .15s,border-color .15s,transform .12s;
      color:var(--text);font-size:12px;font-weight:600
    }
    .quick-btn:hover{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.09)}
    .quick-btn:active{transform:scale(.96);background:var(--surface3)}
    .quick-btn.amber{border-color:rgba(245,158,11,.22);background:rgba(245,158,11,.05)}
    .quick-btn.amber:hover{background:rgba(245,158,11,.09);border-color:rgba(245,158,11,.28)}

    /* Section title */
    .stitle{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}

    /* Template chips */
    .tmpl-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
    .tmpl-chip{
      padding:6px 13px;border-radius:20px;font-size:12px;font-weight:500;
      background:var(--surface);border:1px solid var(--border);
      color:var(--text2);cursor:pointer;
      transition:background .12s,border-color .12s,color .12s,transform .1s;white-space:nowrap
    }
    .tmpl-chip:active{transform:scale(.94)}
    .tmpl-chip.selected{background:var(--amber-dim);border-color:var(--amber-glow);color:var(--amber);font-weight:600}

    /* Animations */
    .tab-pane{animation:tab-in .2s cubic-bezier(.4,0,.2,1) both}
    @keyframes tab-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse-border{0%,100%{box-shadow:0 0 0 0 rgba(244,63,94,.2)}50%{box-shadow:0 0 0 6px rgba(244,63,94,.05)}}
    .urgent-pulse{animation:pulse-border 2.5s ease infinite}
    @keyframes card-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .card-enter{animation:card-in .3s cubic-bezier(.4,0,.2,1) both}
    @keyframes sheet-in{from{transform:translateY(100%);opacity:.5}to{transform:translateY(0);opacity:1}}

    /* Empty state */
    .empty-state{text-align:center;padding:44px 20px}

    /* Increment chips */
    .inc-chips{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap}
    .inc-chip{
      padding:5px 11px;border-radius:12px;font-size:12px;font-weight:600;
      background:var(--surface);border:1px solid var(--border);color:var(--text2);
      cursor:pointer;transition:background .1s,transform .1s,color .1s;font-family:'DM Mono',monospace
    }
    .inc-chip:active{transform:scale(.93);background:var(--surface3)}
    .inc-chip.neg{color:var(--red)}
    .inc-chip.pos{color:var(--green)}

    /* Search bar */
    .search-wrap{position:relative;margin-bottom:4px}
    .search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--text3)}
    .search-inp{
      width:100%;background:var(--surface);border:1px solid var(--border);
      border-radius:12px;padding:10px 12px 10px 36px;color:var(--text);font-size:14px;
      outline:none;transition:border-color .15s;font-family:'Inter','Noto Sans JP',system-ui
    }
    .search-inp:focus{border-color:rgba(245,158,11,.4)}
    .search-inp::placeholder{color:var(--text3)}

    /* Next maint row */
    .next-maint-row{
      display:flex;align-items:center;gap:10px;
      border-bottom:1px solid var(--border2);
      transition:background .12s;border-radius:10px;
      margin:0 -6px;padding:10px 6px
    }
    .next-maint-row:hover{background:rgba(255,255,255,.02)}
    .next-maint-row:last-child{border-bottom:none}

    /* Toast */
    .toast{
      position:fixed;bottom:84px;left:50%;transform:translateX(-50%);
      background:rgba(24,24,27,.97);border:1px solid var(--border);
      border-radius:12px;padding:10px 20px;font-size:13px;font-weight:500;
      z-index:300;white-space:nowrap;
      animation:toast-in .22s cubic-bezier(.34,1.56,.64,1);
      box-shadow:0 8px 32px rgba(0,0,0,.6);
      display:flex;align-items:center;gap:8px
    }
    @media(min-width:768px){.toast{bottom:24px}}
    @keyframes toast-in{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    .toast.success{border-color:rgba(34,197,94,.3);background:rgba(10,22,12,.97)}
    .toast.error{border-color:rgba(244,63,94,.3);background:rgba(22,8,8,.97)}

    /* Form inputs */
    .finp{
      width:100%;background:var(--surface);border:1px solid var(--border);
      border-radius:12px;padding:11px 14px;color:var(--text);font-size:15px;
      outline:none;transition:border-color .15s;
      font-family:'Inter','Noto Sans JP',system-ui,sans-serif
    }
    .finp:focus{border-color:rgba(245,158,11,.5)}
    .flbl{display:block;font-size:11px;color:var(--text3);margin-bottom:6px;font-weight:500;letter-spacing:.2px}
    input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.35)}
    select{-webkit-appearance:none;appearance:none}

    /* Banner */
    .banner{animation:fi .25s ease}
    @keyframes fi{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

    /* Swipe hint */
    .shint{font-size:10px;color:var(--text3);text-align:center;padding:0 0 6px;letter-spacing:.2px}

    /* Settings row */
    .srow{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border2)}
    .srow:last-child{border-bottom:none}

    /* Progress bar */
    .prog-fill{transition:width .65s cubic-bezier(.4,0,.2,1)}

    /* Stat number */
    .stat-num{font-family:'DM Mono','Courier New',monospace}

    /* KPI cards */
    .kpi{background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:14px 16px}
    .kpi-accent{background:linear-gradient(140deg,#150d00,#0b0700);border:1px solid rgba(245,158,11,.18)}

    /* Fuel card grid */
    .fuel-grid-item{border-left:1px solid var(--border2);padding-left:12px}
    .fuel-grid-item:first-child{border-left:none;padding-left:0}

    /* Step dots */
    .step-dot{width:6px;height:6px;border-radius:50%;background:var(--surface3);transition:background .2s,transform .2s}
    .step-dot.active{background:var(--amber);transform:scale(1.3)}
  </style>
</head>

  <div id="loading">
    <div class="spin"></div>
    <div style="color:#636366;font-size:13px">CarLog を起動中…</div>
  </div>
</div>

<!-- Error handler — shows visible error instead of blank screen -->
<script>
window.onerror = function(msg, src, line, col, err) {
  document.getElementById('root').innerHTML =
    '<div style="padding:24px;color:var(--text);background:#000;min-height:100vh">' +
    '<div style="background:#3a0f0f;border:1px solid #f43f5e;border-radius:12px;padding:16px;margin-bottom:16px">' +
    '<div style="color:#fb7185;font-weight:700;margin-bottom:8px">⚠️ 起動エラー</div>' +
    '<div style="font-size:12px;color:#fca5a5;word-break:break-all">' + msg + '</div>' +
    '<div style="font-size:11px;color:#636366;margin-top:6px">行 ' + line + ' 列 ' + col + '</div>' +
    '</div>' +
    '<div style="font-size:12px;color:#636366">ページを再読み込みしてください。繰り返す場合はスクリーンショットをお送りください。</div>' +
    '</div>';
  return false;
};
window.addEventListener('unhandledrejection', function(e) {
  document.getElementById('root').innerHTML =
    '<div style="padding:24px;color:var(--text);background:#000">' +
    '<div style="background:#3a0f0f;border:1px solid #f43f5e;border-radius:12px;padding:16px">' +
    '<div style="color:#fb7185;font-weight:700;margin-bottom:8px">⚠️ 非同期エラー</div>' +
    '<div style="font-size:12px;color:#fca5a5">' + String(e.reason) + '</div>' +
    '</div></div>';
});
</script>

<!-- IndexedDB -->
<script>
var idb = {
  _db: null,
  _open: function() {
    var self = this;
    if (self._db) return Promise.resolve(self._db);
    return new Promise(function(res, rej) {
      var r = indexedDB.open('carlog', 1);
      r.onupgradeneeded = function(e) { e.target.result.createObjectStore('kv'); };
      r.onsuccess = function(e) { self._db = e.target.result; res(self._db); };
      r.onerror = function() { rej(r.error); };
    });
  },
  get: function(key) {
    return this._open().then(function(db) {
      return new Promise(function(res, rej) {
        var r = db.transaction('kv','readonly').objectStore('kv').get(key);
        r.onsuccess = function() { res(r.result != null ? {value: r.result} : null); };
        r.onerror = function() { rej(r.error); };
      });
    });
  },
  set: function(key, value) {
    return this._open().then(function(db) {
      return new Promise(function(res, rej) {
        var r = db.transaction('kv','readwrite').objectStore('kv').put(value, key);
        r.onsuccess = function() { res({key:key, value:value}); };
        r.onerror = function() { rej(r.error); };
      });
    });
  }
};
</script>

<!-- App (pure React.createElement — no JSX, no Babel, no htm) -->
<script>
(function() {
  'use strict';

  // Verify dependencies
  if (!window.React)    throw new Error('React が読み込まれていません');
  if (!window.ReactDOM) throw new Error('ReactDOM が読み込まれていません');

  var h = React.createElement;
  var useState    = React.useState;
  var useEffect   = React.useEffect;
  var useMemo     = React.useMemo;
  var useRef      = React.useRef;
  var useCallback = React.useCallback;

  // ── SVG Charts (no external lib) ──────────────────────────────────────────
  var PAD = {top:8, right:8, bottom:24, left:34};

  function SvgLine(props) {
    // props: data (array of objects), xKey, yKey, color, height, label
    var data = props.data || [];
    var W = 400, H = props.height || 130;
    var pl=PAD.left, pr=PAD.right, pt=PAD.top, pb=PAD.bottom;
    var iw = W-pl-pr, ih = H-pt-pb;
    if (!data.length) return h('div',{style:{height:H,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text3)',fontSize:12}},'データなし');
    var vals = data.map(function(d){return +d[props.yKey];});
    var mn = Math.min.apply(null,vals), mx = Math.max.apply(null,vals);
    var rng = mx - mn || 1;
    function px(i){ return pl + i/(data.length-1||1)*iw; }
    function py(v){ return pt + ih - (v-mn)/rng*ih; }
    var pts = data.map(function(d,i){ return px(i)+','+py(+d[props.yKey]); }).join(' ');
    // x labels: show up to 5
    var xLabels = [];
    var step = Math.ceil(data.length/5);
    for(var i=0;i<data.length;i+=step){
      xLabels.push(h('text',{key:i,x:px(i),y:H-6,fill:'var(--text3)',fontSize:9,textAnchor:'middle'},data[i][props.xKey]));
    }
    // y labels
    var yLabels = [mn, mn+rng/2, mx].map(function(v,i){
      return h('text',{key:i,x:pl-4,y:py(v)+4,fill:'var(--text3)',fontSize:9,textAnchor:'end'},v.toFixed(1));
    });
    // dots
    var dots = data.map(function(d,i){
      return h('circle',{key:i,cx:px(i),cy:py(+d[props.yKey]),r:3,fill:props.color||'#f59e0b'});
    });
    // 最高値・最低値の強調ラベル
    var maxVal=Math.max.apply(null,vals), minVal=Math.min.apply(null,vals);
    var maxIdx=vals.indexOf(maxVal), minIdx=vals.indexOf(minVal);
    var valueDots = data.map(function(d,i){
      var isMax=(+d[props.yKey]===maxVal), isMin=(+d[props.yKey]===minVal);
      if(!isMax&&!isMin) return null;
      var cx2=px(i), cy2=py(+d[props.yKey]);
      var col=isMax?'#4ade80':'#f87171';
      var labelY = isMax ? cy2-8 : cy2+14;
      return h(React.Fragment,{key:i},
        h('circle',{cx:cx2,cy:cy2,r:4,fill:col,stroke:'none'}),
        h('text',{x:cx2,y:labelY,fill:col,fontSize:8,textAnchor:'middle',fontWeight:'bold'},(+d[props.yKey]).toFixed(1))
      );
    });
    return h('div',{style:{position:'relative',width:'100%',height:H}},
      h('svg',{viewBox:'0 0 '+W+' '+H,preserveAspectRatio:'none',style:{width:'100%',height:'100%'}},
        h('line',{x1:pl,y1:pt,x2:pl,y2:pt+ih,stroke:'#1e1e1e',strokeWidth:1}),

        h('button',{className:'btn-ghost',style:S.bG,onClick:props.onCancel},'キャンセル'),
        h('button',{className:'btn-primary',style:Object.assign({},S.bP,{flex:1,justifyContent:'center'}),onClick:props.onSave,disabled:!ok},'保存する')
      )
    );
  }

  // ── App ────────────────────────────────────────────────────────────────────
  function App() {
    var ts = useState(0);   var tab=ts[0],setTab=ts[1];
    var vs = useState(IV);  var vehicle=vs[0],setVehicle=vs[1];
    var ms = useState(IM);  var maint=ms[0],setMaint=ms[1];
    var fs = useState(IFU); var fuel=fs[0],setFuel=fs[1];
    var rs = useState(IR);  var remind=rs[0],setRemind=rs[1];
    var mo = useState(null); var modal=mo[0],setModal=mo[1];
    var ei = useState(null); var editId=ei[0],setEditId=ei[1];
    var tp = useState(false); var tmpl=tp[0],setTmpl=tp[1];
    var ss = useState('idle'); var saveSt=ss[0],setSaveSt=ss[1];
    var ie = useState(''); var impErr=ie[0],setImpErr=ie[1];
    var nss=useState({enabled:false,timing:1000,timingDay:30}); var notifSetting=nss[0],setNotifSetting=nss[1];
    var nps=useState('default'); var notifPerm=nps[0],setNotifPerm=nps[1];
    var loaded=useRef(false), iref=useRef();

    var eM={date:'',type:'',mileage:'',cost:'',note:''};
    var eF={date:'',mileage:'',liters:'',price:'',unit:''};
    var eR={type:'',dueMileage:'',dueDate:''};
    var mfs=useState(eM); var mF=mfs[0],setMF=mfs[1];
    var mss=useState(''); var maintSearch=mss[0],setMaintSearch=mss[1];
    var tst=useState(null); var toast=tst[0],setToast=tst[1];
    var toastTimer=useRef(null);
    function showToast(msg,type){
      clearTimeout(toastTimer.current);
      setToast({msg:msg,type:type||'success'});
      toastTimer.current=setTimeout(function(){setToast(null);},2500);
    }
    var fss=useState(''); var fuelSearch=fss[0],setFuelSearch=fss[1];
    var ffs=useState(eF); var fF=ffs[0],setFF=ffs[1];
    var rfs=useState(eR); var rF=rfs[0],setRF=rfs[1];
    var vfs=useState(IV); var vF=vfs[0],setVF=vfs[1];

    // Storage load
    useEffect(function(){
      var lV=IV,lM=IM,lF=IFU,lR=IR,lN={enabled:false,timing:1000,timingDay:30};

      function parseAndApply(raw) {
        if(!raw) return;
        try {
          var d=JSON.parse(raw);
          if(d.vehicle){setVehicle(d.vehicle);lV=d.vehicle;}
          if(d.maint!=null){setMaint(d.maint);lM=d.maint;}
          if(d.fuel!=null){setFuel(d.fuel);lF=d.fuel;}
          if(d.remind!=null){setRemind(d.remind);lR=d.remind;}
          if(d.notif){setNotifSetting(d.notif);lN=d.notif;}
        } catch(e){console.warn('parse error',e);}
      }

      function runNotifCheck() {
        if(!lN.enabled||!('Notification' in window)||Notification.permission!=='granted') return;
        try {
          var today=new Date().toISOString().slice(0,10);
          if(localStorage.getItem('carlog-notif-checked')===today) return;
          localStorage.setItem('carlog-notif-checked',today);
          var allM=[lV.mileage];
          lM.forEach(function(m){if(m.mileage)allM.push(m.mileage);});
          lF.forEach(function(f){if(f.mileage)allM.push(f.mileage);});
          var lCur=Math.max.apply(null,allM);
          var thr=lN.timing||1000, thrD=lN.timingDay||30;
          lR.filter(function(r){
            if(r.done)return false;
            if(r.dueMileage&&lCur>=r.dueMileage-thr)return true;
            if(r.dueDate&&(new Date(r.dueDate)-new Date())/86400000<=thrD)return true;
            return false;
          }).forEach(function(r){
            var body='';
            if(r.dueMileage)body+='目標 '+r.dueMileage.toLocaleString('ja-JP')+' km（残 '+(r.dueMileage-lCur).toLocaleString('ja-JP')+' km）';
            if(r.dueDate)body+=(body?' · ':'')+'期限 '+r.dueDate.replace(/-/g,'/');
            try{new Notification('CarLog: '+r.type,{body:body||'対応が必要です',icon:'./icon.svg'});}catch(ne){}
          });
        } catch(ne){console.warn('notif check error',ne);}
      }

      idb.get(SK).then(function(r){
        // IndexedDB優先、なければlocalStorageから復元
        var raw=r&&r.value;
        if(!raw){try{raw=localStorage.getItem(SK);}catch(e){}}
        parseAndApply(raw);
        runNotifCheck();
        loaded.current=true;
      }).catch(function(e){
        console.warn('idb load error:',e);
        // IndexedDB失敗時はlocalStorageから復元（初期データ上書きを防ぐ）
        var raw; try{raw=localStorage.getItem(SK);}catch(le){}
        parseAndApply(raw);
        loaded.current=true;
      });
    },[]);

    // Debounced save（IndexedDB + localStorage同期バックアップ）
    var saveTimer=useRef(null);
    useEffect(function(){
      clearTimeout(saveTimer.current);
      saveTimer.current = setTimeout(function(){
        if(!loaded.current) return;
        var json=JSON.stringify({vehicle:vehicle,maint:maint,fuel:fuel,remind:remind,notif:notifSetting});
        // localStorage に即時同期保存（ページ離脱前でも保持される）
        try{localStorage.setItem(SK,json);}catch(e){}
        setSaveSt('saving');
        idb.set(SK,json)
          .then(function(){setSaveSt('saved');setTimeout(function(){setSaveSt('idle');},2000);})
          .catch(function(e){console.warn('save:',e);setSaveSt('error');showToast('保存に失敗しました','error');setTimeout(function(){setSaveSt('idle');},3000);});
      }, 300);
      return function(){clearTimeout(saveTimer.current);};
    },[vehicle,maint,fuel,remind,notifSetting]);

    // 通知許可状態を同期
    useEffect(function(){
      if('Notification' in window) setNotifPerm(Notification.permission);
    },[]);

    // Derived
    // 総走行距離: 全記録の最大値 と 手動設定値 の大きい方を使用（案B）
    var cur = useMemo(function(){
      var allMileages = [vehicle.mileage];
      maint.forEach(function(m){ if(m.mileage) allMileages.push(m.mileage); });
      fuel.forEach(function(f){ if(f.mileage) allMileages.push(f.mileage); });
      return Math.max.apply(null, allMileages);
    }, [vehicle.mileage, maint, fuel]);
    var sfuel = useMemo(function(){ return fuel.slice().sort(function(a,b){return a.date<b.date?-1:1;}); },[fuel]);
    var fChart = useMemo(function(){
      var r=[];
      for(var i=1;i<sfuel.length;i++){
        var dist=sfuel[i].mileage-sfuel[i-1].mileage;
        if(dist>0) r.push({date:sfuel[i].date.slice(5),kmL:parseFloat((dist/sfuel[i].liters).toFixed(1))});
      }
      return r;
    },[sfuel]);
    var avgKmL = useMemo(function(){
      if(!fChart.length) return '-';
      return (fChart.reduce(function(s,d){return s+d.kmL;},0)/fChart.length).toFixed(1);
    },[fChart]);
    var totalCost = useMemo(function(){ return maint.reduce(function(s,m){return s+Number(m.cost);},0); },[maint]);
    var monthlyCost = useMemo(function(){
      var map={};
      maint.forEach(function(m){ var k=m.date.slice(0,7); map[k]=(map[k]||0)+Number(m.cost); });
      return Object.keys(map).sort().slice(-10).map(function(k){return{month:k.slice(5)+'月',cost:map[k]};});
    },[maint]);
    var monthlyKm = useMemo(function(){
      var s=fuel.slice().sort(function(a,b){return a.date<b.date?-1:1;});
      var map={};
      for(var i=1;i<s.length;i++){
        var d=s[i].mileage-s[i-1].mileage;
        if(d>0&&d<3000){var k=s[i].date.slice(0,7);map[k]=(map[k]||0)+d;}
      }
      return Object.keys(map).sort().map(function(k){return{month:k.slice(5)+'月',km:map[k]};});
    },[fuel]);
    var catData = useMemo(function(){
      var map={};
      maint.forEach(function(m){map[m.type]=(map[m.type]||0)+Number(m.cost);});
      return Object.entries(map).sort(function(a,b){return b[1]-a[1];}).map(function(e){return{name:e[0],value:e[1]};});
    },[maint]);
    var unitTrend = useMemo(function(){return sfuel.map(function(f){return{date:f.date.slice(5),unit:f.unit};});},[sfuel]);
    var urgentR = remind.filter(function(r){
      if(r.done) return false;
      if(r.dueMileage && cur>=r.dueMileage-1000) return true;
      if(r.dueDate && (new Date(r.dueDate)-new Date())/86400000<=30) return true;
      return false;
    });
    function rPct(r) {
      if(r.done) return 100;
      if(r.dueMileage){
        // 同じ種類の最後のメンテ距離をスタートとして進捗を計算
        var last=maint.filter(function(m){return m.type===r.type;}).sort(function(a,b){return b.mileage-a.mileage;})[0];
        var start=last?last.mileage:Math.max(0,r.dueMileage-5000);
        if(r.dueMileage<=start) return 100;
        return Math.min(100,Math.max(0,Math.round((cur-start)/(r.dueMileage-start)*100)));
      }
      if(r.dueDate){
        // 登録日からの経過割合（登録日が不明なので180日前をスタートとする）
        var due=new Date(r.dueDate), now=new Date();
        var totalDays=180; // 半年スパンで進捗表示
        var elapsed=totalDays-(due-now)/86400000;
        return Math.min(100,Math.max(0,Math.round(elapsed/totalDays*100)));
      }
      return 0;
    }
    // 次回メンテ: リマインダー未完了を残り距離/日数が近い順に並べる
    var nextMaints = useMemo(function(){
      return remind.filter(function(r){return !r.done;}).map(function(r){
        var remKm = r.dueMileage ? r.dueMileage - cur : null;
        var remDay = r.dueDate ? Math.ceil((new Date(r.dueDate)-new Date())/86400000) : null;
        return assign({},r,{remKm:remKm,remDay:remDay});
      }).sort(function(a,b){
        // 距離ベースを優先、次に日付ベース
        var scoreA = a.remKm!=null ? a.remKm : (a.remDay!=null ? a.remDay*10 : 99999);
        var scoreB = b.remKm!=null ? b.remKm : (b.remDay!=null ? b.remDay*10 : 99999);
        return scoreA - scoreB;
      }).slice(0,3);
    },[remind,cur]);

    var lfm = useMemo(function(){return fuel.length?Math.max.apply(null,fuel.map(function(f){return f.mileage;})):null;},[fuel]);
    var lfd = useMemo(function(){return sfuel.length?sfuel[sfuel.length-1].date:null;},[sfuel]);

    // CRUD helpers
    function openAdd(t) {
      setEditId(null);
      if(t==='maint') setMF(assign({},eM,{mileage:String(cur)}));
      else if(t==='fuel') setFF(assign({},eF));
      else setRF(assign({},eR));
      setTmpl(false); setModal(t);
    }
    function openEdit(t,item) {
      setEditId(item.id); setTmpl(false);
      if(t==='maint') setMF({date:item.date,type:item.type,mileage:String(item.mileage),cost:String(item.cost),note:item.note});
      if(t==='fuel')  setFF({date:item.date,mileage:String(item.mileage),liters:String(item.liters),price:String(item.price),unit:String(item.unit)});
      if(t==='remind') setRF({type:item.type,dueMileage:item.dueMileage?String(item.dueMileage):'',dueDate:item.dueDate||''});
      setModal(t);
    }
    function saveMaint() {
      var r=assign(mF,{mileage:+mF.mileage,cost:+mF.cost});
      if(editId) setMaint(function(p){return p.map(function(x){return x.id===editId?assign(r,{id:editId}):x;});});
      else setMaint(function(p){return [assign(r,{id:Date.now()})].concat(p);});
      setModal(null);
      showToast('メンテ記録を保存しました ✓');
    }
    function saveFuel2() {
      var r=assign(fF,{mileage:+fF.mileage,liters:+fF.liters,price:+fF.price,unit:+fF.unit});
      if(editId) {
        setFuel(function(p){return p.map(function(x){return x.id===editId?assign(r,{id:editId}):x;});});
      } else {
        setFuel(function(p){return [assign(r,{id:Date.now()})].concat(p);});
        if(r.mileage > cur) setVehicle(function(v){return assign({},v,{mileage:r.mileage});});
      }
      setModal(null);
      showToast('給油記録を保存しました ✓');
    }
    function saveRemind() {
      var r=assign(rF,{dueMileage:rF.dueMileage?+rF.dueMileage:null,done:false});
      if(editId) setRemind(function(p){return p.map(function(x){return x.id===editId?assign(r,{id:editId,done:x.done}):x;});});
      else setRemind(function(p){return p.concat([assign(r,{id:Date.now()})]);});
      setModal(null);
      showToast('リマインダーを保存しました ✓');
    }
    function saveVehicle() { setVehicle(vF); setModal(null); }

    function doExport() { dlJ({version:5,exportedAt:new Date().toISOString(),vehicle:vehicle,maint:maint,fuel:fuel,remind:remind},'carlog-backup.json'); }
    function doImport(e) {
      var file=e.target.files&&e.target.files[0]; if(!file) return;
      var rd=new FileReader();
      rd.onload=function(ev){
        try{
          var d=JSON.parse(ev.target.result);
          if(d.vehicle)setVehicle(d.vehicle);
          if(d.maint)setMaint(d.maint);
          if(d.fuel)setFuel(d.fuel);
          if(d.remind)setRemind(d.remind);
          setImpErr(''); setModal(null);
        }catch(err){setImpErr('JSONの読み込みに失敗しました。');}
      };
      rd.readAsText(file); e.target.value='';
    }

    // ── Render ───────────────────────────────────────────────────────────────
    var TABS = [{l:'ホーム',n:'home'},{l:'メンテ',n:'wrench'},{l:'給油',n:'fuel'},{l:'リマインダー',n:'bell'},{l:'分析',n:'bar'}];
    var crd = S.crd;

    // KPI card
    function KpiCard(label, value, color) {
      return h('div',{className:'kpi'},
        h('div',{style:{fontSize:10,color:'var(--text3)',fontWeight:500,marginBottom:6,letterSpacing:'.3px',textTransform:'uppercase'}},label),
        h('div',{className:'stat-num',style:{fontSize:18,fontWeight:700,color:color||'var(--amber)',letterSpacing:'-.5px'}},value)
      );
    }

    // Maint card
    function MCard(m) {
      return h(SwipeCard,{key:m.id,label:m.type,
        onEdit:function(){openEdit('maint',m);},
        onDelete:function(){setMaint(function(p){return p.filter(function(x){return x.id!==m.id;});});},
        style:{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:18}},
        h('div',{style:{borderBottom:'1px solid var(--border2)',padding:'13px 15px',display:'flex',alignItems:'center',gap:11}},
          h('div',{style:{width:34,height:34,borderRadius:10,background:'var(--amber-dim)',border:'1px solid var(--amber-glow)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}},
            h(Ico,{name:'wrench',size:15,color:'var(--amber)'})),
          h('div',{style:{flex:1,minWidth:0}},
            h('div',{style:{fontWeight:600,fontSize:14,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',letterSpacing:'-.2px'}},m.type)
          ),
          h('div',{className:'stat-num',style:{fontSize:15,fontWeight:700,color:'var(--amber)',flexShrink:0}},'¥'+fmt(m.cost)),
          h('div',{style:{display:'flex',gap:2,flexShrink:0,marginLeft:4}},
            h('button',{className:'btn-icon',style:S.bI,onClick:function(){openEdit('maint',m);}},h(Ico,{name:'pencil',size:13})),
            h('button',{className:'btn-icon',style:S.bI,onClick:function(){setMaint(function(p){return p.filter(function(x){return x.id!==m.id;});});}},h(Ico,{name:'x',size:13}))
          )
        ),
        h('div',{style:{padding:'9px 15px',display:'flex',alignItems:'center',gap:14}},
          h('div',{style:{display:'flex',alignItems:'center',gap:5}},
            h(Ico,{name:'clock',size:11,color:'var(--text3)'}),
            h('span',{className:'stat-num',style:{fontSize:11,color:'var(--text3)'}},fd(m.date))
          ),
          h('div',{style:{display:'flex',alignItems:'center',gap:5}},
            h(Ico,{name:'gauge',size:11,color:'var(--text3)'}),
            h('span',{className:'stat-num',style:{fontSize:11,color:'var(--text3)'}},fmt(m.mileage)+' km')
          ),
          m.note ? h('div',{style:{fontSize:11,color:'var(--text3)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}},'💬 '+m.note) : null
        )
      );
    }

    // Reminder card
    function RCard(r) {
      var p=rPct(r), iu=urgentR.find(function(u){return u.id===r.id;});
      var bc=p>=90?'var(--red)':p>=70?'var(--amber)':'var(--cyan)';
      var bcRaw=p>=90?'#f43f5e':p>=70?'#f59e0b':'#22d3ee';
      return h(SwipeCard,{key:r.id,label:r.type,
        onEdit:function(){openEdit('remind',r);},
        onDelete:function(){setRemind(function(p){return p.filter(function(x){return x.id!==r.id;});});},
        style:{background:'var(--surface2)',border:'1px solid '+(iu?'rgba(244,63,94,.25)':'var(--border)'),borderRadius:18,animation:iu?'pulse-border 2.5s ease infinite':undefined}},
        h('div',{style:{borderBottom:'1px solid var(--border2)',padding:'12px 15px',display:'flex',alignItems:'center',gap:10}},
          h('button',{onClick:function(){
              var tmplMatch=TMPLS.find(function(t){return t.type===r.type&&t.km;});
              if(tmplMatch){
                setRemind(function(p){
                  return p.map(function(x){return x.id===r.id?assign(x,{done:true}):x;})
                    .concat([{id:Date.now(),type:r.type,dueMileage:cur+tmplMatch.km,dueDate:null,done:false}]);
                });
                showToast('完了！次回を '+fmt(cur+tmplMatch.km)+' km に設定しました');
              } else {
                setRemind(function(p){return p.map(function(x){return x.id===r.id?assign(x,{done:true}):x;});});
                showToast(r.type+' を完了しました ✓');
              }
            },
            style:assign(S.bI,{padding:0,flexShrink:0,color:'var(--surface3)'})},
            h(Ico,{name:'check',size:23})),
          h('div',{style:{flex:1,minWidth:0}},
            h('div',{style:{fontSize:14,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',letterSpacing:'-.2px'}},r.type)
          ),
          h('div',{style:{display:'flex',alignItems:'center',gap:6,flexShrink:0}},
            iu ? h('span',{style:{padding:'3px 9px',borderRadius:7,fontSize:11,fontWeight:700,background:'rgba(244,63,94,.1)',color:'#fb7185',border:'1px solid rgba(244,63,94,.25)'}},'要対応') : null,
            h('button',{className:'btn-icon',style:S.bI,onClick:function(){openEdit('remind',r);}},h(Ico,{name:'pencil',size:13})),
            h('button',{className:'btn-icon',style:S.bI,onClick:function(){setRemind(function(p){return p.filter(function(x){return x.id!==r.id;});});}},h(Ico,{name:'x',size:13}))
          )
        ),
        h('div',{style:{padding:'12px 15px'}},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:10}},
            h('div',{style:{display:'flex',gap:18}},
              r.dueMileage ? h('div',null,
                h('div',{style:{fontSize:10,color:'var(--text3)',marginBottom:3,textTransform:'uppercase',letterSpacing:'.3px'}},'目標距離'),
                h('div',{className:'stat-num',style:{fontSize:14,fontWeight:700,color:'var(--text)'}},fmt(r.dueMileage)+' km'),
                h('div',{className:'stat-num',style:{fontSize:11,color:p>=90?'#fb7185':'var(--text3)',marginTop:2}},'残 '+fmt(r.dueMileage-cur)+' km')
              ) : null,
              r.dueDate ? h('div',null,
                h('div',{style:{fontSize:10,color:'var(--text3)',marginBottom:3,textTransform:'uppercase',letterSpacing:'.3px'}},'期限日'),
                h('div',{className:'stat-num',style:{fontSize:14,fontWeight:700,color:'var(--text)'}},fd(r.dueDate)),
                h('div',{className:'stat-num',style:{fontSize:11,color:'var(--text3)',marginTop:2}},'残 '+Math.max(0,Math.floor((new Date(r.dueDate)-new Date())/86400000))+' 日')
              ) : null
            ),
            h('div',{className:'stat-num',style:{fontSize:14,fontWeight:800,color:bc}},p+'%')
          ),
          h('div',{style:{height:6,borderRadius:3,background:'var(--surface3)',overflow:'hidden'}},
            h('div',{className:'prog-fill',style:{height:'100%',borderRadius:3,width:p+'%',background:bcRaw,boxShadow:p>0?'0 0 10px '+bcRaw+'66':undefined}})
          )
        )
      );
    }

    return h('div',{className:'app-shell'},

      // ── Sidebar (desktop) ────────────────────────────────────────────────
      h('nav',{className:'sidebar'},
        h('div',{className:'sidebar-logo'},
          h('div',{className:'sidebar-logo-icon'},h(Ico,{name:'car',size:17,color:'#000'})),
          h('div',null,
            h('div',{className:'sidebar-logo-text'},'CarLog'),
            h('div',{className:'sidebar-logo-sub'},vehicle.name+' · '+vehicle.year)
          )
        ),
        h('div',{className:'sidebar-nav'},
          TABS.map(function(t,i){
            return h('button',{key:t.l,className:'sidebar-item'+(tab===i?' active':''),onClick:function(){setTab(i);}},
              h(Ico,{name:t.n,size:18}),h('span',null,t.l));
          })
        ),
        h('div',{className:'sidebar-footer'},
          h('div',{className:'sidebar-footer-stat'},'現在の走行距離'),
          h('div',{className:'sidebar-footer-val'},fmt(cur)+' km'),
          h('div',{className:'sidebar-footer-sub'},vehicle.fuelType)
        )
      ),

      // ── Main content ─────────────────────────────────────────────────────
      h('div',{className:'main-content'},

      // ── Header ──────────────────────────────────────────────────────────

                  style:{background:'var(--surface)',border:'1px solid var(--border2)',borderRadius:14}},
                  h('div',{style:{padding:'12px 15px',display:'flex',alignItems:'center',gap:10}},
                    h('button',{onClick:function(){setRemind(function(p){return p.map(function(x){return x.id===r.id?assign(x,{done:false}):x;});});},
                      style:assign(S.bI,{padding:0,color:'var(--green)',flexShrink:0})},h(Ico,{name:'check',size:20})),
                    h('div',{style:{flex:1,fontSize:13,color:'var(--text3)',textDecoration:'line-through'}},r.type),
                    h('button',{className:'btn-icon',style:S.bI,onClick:function(){setRemind(function(p){return p.filter(function(x){return x.id!==r.id;});});}},h(Ico,{name:'x',size:13}))
                  )
                );
              })
            )
          ) : null,
          remind.length===0 ? h('div',{className:'crd',style:{textAlign:'center',padding:'40px 20px'}},
            h(Ico,{name:'bell',size:30,style:{margin:'0 auto 12px',opacity:.25,display:'block',color:'var(--text3)'}}),
            h('div',{style:{fontSize:14,color:'var(--text3)',fontWeight:500}},'リマインダーがありません'),
            h('div',{style:{fontSize:12,color:'var(--text3)',marginTop:4,opacity:.6}},'追加ボタンから登録してください')
          ) : null
        ) : null,

        // ── ANALYTICS ──
        tab===4 ? h('div',{className:'tab-pane',style:{display:'flex',flexDirection:'column',gap:12}},
          h('div',{className:'stitle',style:{display:'flex',alignItems:'center',gap:6,marginBottom:0}},
            h(Ico,{name:'trend',size:13,color:'var(--amber)'}),'費用・燃費分析'),
          h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}},
            KpiCard('総メンテ費用','¥'+fmt(totalCost),'var(--amber)'),
            KpiCard('平均燃費',avgKmL+' km/L','var(--amber)'),
            KpiCard('最高燃費',fChart.length?Math.max.apply(null,fChart.map(function(d){return d.kmL;}))+' km/L':'-','var(--green)'),
            KpiCard('平均単価',fuel.length?'¥'+(fuel.reduce(function(s,f){return s+f.unit;},0)/fuel.length).toFixed(1)+'/L':'-','var(--cyan)')
          ),
          monthlyKm.length > 0 ? h('div',{className:'crd'},
            h('div',{style:{fontWeight:600,fontSize:14,marginBottom:14,letterSpacing:'-.3px'}},'月別走行距離 ',h('span',{style:{fontSize:11,color:'var(--text3)',fontWeight:400}},'(km)')),
            h(SvgBar,{data:monthlyKm,xKey:'month',yKey:'km',color:'var(--cyan)',height:150})
          ) : null,
          h('div',{className:'crd'},
            h('div',{style:{fontWeight:600,fontSize:14,marginBottom:14,letterSpacing:'-.3px'}},'月別メンテ費用'),
            h(SvgBar,{data:monthlyCost,xKey:'month',yKey:'cost',color:'var(--amber)',height:150})
          ),
          h('div',{className:'crd'},
            h('div',{style:{fontWeight:600,fontSize:14,marginBottom:14,letterSpacing:'-.3px'}},'項目別費用内訳'),
            h('div',{style:{display:'flex',gap:16,alignItems:'center'}},
              h('div',{style:{flexShrink:0}},
                h(SvgDonut,{data:catData,colors:PIE,size:130})
              ),
              h('div',{style:{flex:1,display:'flex',flexDirection:'column',gap:8}},
                catData.map(function(c,i){
                  return h('div',{key:c.name},
                    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}},
                      h('div',{style:{display:'flex',alignItems:'center',gap:7}},
                        h('div',{style:{width:8,height:8,borderRadius:2,background:PIE[i%PIE.length],flexShrink:0}}),
                        h('span',{style:{fontSize:12,color:'var(--text2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:100}},c.name)
                      ),
                      h('span',{className:'stat-num',style:{fontSize:12,color:'var(--text)',marginLeft:6,flexShrink:0}},'¥'+fmt(c.value))
                    ),
                    h('div',{style:{height:3,borderRadius:2,background:'var(--surface3)',overflow:'hidden'}},
                      h('div',{className:'prog-fill',style:{height:'100%',borderRadius:2,width:Math.round(c.value/totalCost*100)+'%',background:PIE[i%PIE.length]}})
                    )
                  );
                })
              )
            )
          ),
          h('div',{className:'crd'},
            h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:14}},
              h('div',{style:{fontWeight:600,fontSize:14,letterSpacing:'-.3px'}},'給油単価推移'),
              unitTrend.length ? h('div',{style:{display:'flex',gap:12}},
                h('span',{className:'stat-num',style:{fontSize:11,color:'var(--green)'}},
                  '最安 ¥'+Math.min.apply(null,unitTrend.map(function(d){return d.unit;})).toFixed(0)),
                h('span',{className:'stat-num',style:{fontSize:11,color:'var(--amber)'}},
                  '最近 ¥'+unitTrend[unitTrend.length-1].unit)
              ) : null
            ),
            h(SvgBar,{data:unitTrend,xKey:'date',yKey:'unit',color:'var(--cyan)',height:150})
          )
        ) : null

      )

      ), // end main-content

      // Bottom Nav
      h('nav',{className:'bottom-nav'},
        TABS.map(function(t,i){
          return h('button',{key:t.l,className:'nav-item'+(tab===i?' active':''),onClick:function(){setTab(i);}},
            h(Ico,{name:t.n,size:20}),
            h('span',null,t.l));
        })
      ),

      // Toast
      toast ? h('div',{className:'toast '+toast.type},
        h('span',null, toast.type==='success' ? '✓' : '✕'),
        toast.msg
      ) : null,

      // Modal
      modal ? h('div',{className:'overlay',onClick:function(){setModal(null);}},
        h('div',{className:'sheet',onClick:function(e){e.stopPropagation();}},
          h('div',{className:'drag-handle'}),
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:22}},
            h('div',{style:{fontWeight:700,fontSize:18,letterSpacing:'-.4px'}},
              modal==='maint'  ? (editId?'メンテ記録を編集':'メンテ記録を追加') :
              modal==='fuel'   ? (editId?'給油記録を編集':'給油記録を追加') :
              modal==='remind' ? (editId?'リマインダーを編集':'リマインダーを追加') : '設定'
            ),
            h('button',{className:'btn-icon',onClick:function(){setModal(null);},style:assign(S.bI,{color:'var(--text2)'})},h(Ico,{name:'x',size:20}))
          ),

          // Maint form
          modal==='maint' ? h('div',{style:{display:'flex',flexDirection:'column',gap:16}},
            // テンプレートチップ — 常時表示
            h('div',null,
              h('label',{style:S.lbl},'よく使うメンテ種類'),
              h('div',{className:'tmpl-chips'},
                TMPLS.map(function(t){
                  return h('button',{
                    key:t.type,
                    className:'tmpl-chip'+(mF.type===t.type?' selected':''),
                    onClick:function(){
                      setMF(function(p){return assign({},p,{
                        type:t.type,
                        mileage:p.mileage||String(cur)
                      });});
                    }
                  }, t.type);
                })
              ),
              h('input',{style:S.inp,placeholder:'または直接入力…',value:mF.type,onChange:function(e){setMF(function(p){return assign({},p,{type:e.target.value});})}})
            ),
            h('div',null,h('label',{style:S.lbl},'日付'),h('input',{type:'date',style:S.inp,value:mF.date,onChange:function(e){setMF(function(p){return assign({},p,{date:e.target.value});});}})),
            h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}},
              h('div',null,
                h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}},
                  h('label',{style:assign(S.lbl,{marginBottom:0})},'走行距離 (km)'),
                  !mF.mileage ? h('button',{
                    onClick:function(){setMF(function(p){return assign({},p,{mileage:String(cur)});});},
                    style:{fontSize:10,color:'var(--amber)',background:'var(--amber-dim)',border:'none',borderRadius:6,padding:'2px 8px',cursor:'pointer',fontWeight:600}
                  },'現在値') : null
                ),
                h('input',{type:'number',style:S.inp,placeholder:String(cur),inputMode:'numeric',value:mF.mileage,onChange:function(e){setMF(function(p){return assign({},p,{mileage:e.target.value});})}})
              ),
              h('div',null,
                mF.mileage ? h('div',{className:'inc-chips'},
                  [-500,-100,100,500].map(function(d){
                    return h('button',{key:d,className:'inc-chip '+(d<0?'neg':'pos'),
                      onClick:function(){setMF(function(p){return assign({},p,{mileage:String(Math.max(0,(+p.mileage||0)+d))});});}
                    },(d>0?'+':'')+d.toLocaleString());
                  })
                ) : null
              ),
              h('div',null,h('label',{style:S.lbl},'費用 (円)'),h('input',{type:'number',style:S.inp,placeholder:'5000',inputMode:'numeric',value:mF.cost,onChange:function(e){setMF(function(p){return assign({},p,{cost:e.target.value});})}}))
            ),
            h('div',null,h('label',{style:S.lbl},'メモ (任意)'),h('input',{style:S.inp,placeholder:'使用オイルの種類など',value:mF.note,onChange:function(e){setMF(function(p){return assign({},p,{note:e.target.value});})}})),
            h('div',{style:{display:'flex',gap:10,marginTop:4}},
              h('button',{className:'btn-ghost',style:S.bG,onClick:function(){setModal(null);}},'キャンセル'),
              h('button',{className:'btn-primary',style:assign(S.bP,{flex:1,justifyContent:'center'}),onClick:saveMaint,disabled:!mF.date||!mF.type},'保存する')
            )
          ) : null,

          // Fuel form
          modal==='fuel' ? h(FuelForm,{fF:fF,setFF:setFF,onCancel:function(){setModal(null);},onSave:saveFuel2,latestMileage:editId?null:lfm}) : null,

          // Reminder form
          modal==='remind' ? h('div',{style:{display:'flex',flexDirection:'column',gap:16}},
            h('div',null,
              h('label',{style:S.lbl},'よく使うメンテ種類'),
              h('div',{className:'tmpl-chips'},
                TMPLS.map(function(t){
                  return h('button',{
                    key:t.type,
                    className:'tmpl-chip'+(rF.type===t.type?' selected':''),
                    onClick:function(){
                      setRF(function(p){return assign({},p,{
                        type:t.type,
                        dueMileage:t.km?String(cur+t.km):p.dueMileage
                      });});
                    }
                  },
                  t.km
                    ? h(React.Fragment,null,t.type,h('span',{style:{fontSize:10,opacity:.6,marginLeft:3}},'+'+fmt(t.km)))
                    : t.type
                  );
                })
              ),
              h('input',{style:S.inp,placeholder:'または直接入力…',value:rF.type,onChange:function(e){setRF(function(p){return assign({},p,{type:e.target.value});});}})
            ),
            h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}},
              h('div',null,h('label',{style:S.lbl},'目標走行距離 (km)'),h('input',{type:'number',style:S.inp,placeholder:'50000',value:rF.dueMileage,onChange:function(e){setRF(function(p){return assign({},p,{dueMileage:e.target.value});})}})),
              h('div',null,h('label',{style:S.lbl},'期限日'),h('input',{type:'date',style:S.inp,value:rF.dueDate,onChange:function(e){setRF(function(p){return assign({},p,{dueDate:e.target.value});})}}))
            ),
            h('div',{style:{display:'flex',gap:10,marginTop:4}},
              h('button',{className:'btn-ghost',style:S.bG,onClick:function(){setModal(null);}},'キャンセル'),
              h('button',{className:'btn-primary',style:assign(S.bP,{flex:1,justifyContent:'center'}),onClick:saveRemind,disabled:!rF.type},'保存する')
            )
          ) : null,

          // Settings
          modal==='settings' ? h('div',{style:{display:'flex',flexDirection:'column',gap:0}},
            h('div',{style:{fontSize:11,color:'var(--text3)',fontWeight:600,textTransform:'uppercase',letterSpacing:'.7px',marginBottom:14}},'車両情報'),
            h('div',{style:{display:'flex',flexDirection:'column',gap:12,marginBottom:24}},
              h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}},
                h('div',null,h('label',{style:S.lbl},'車名'),h('input',{style:S.inp,placeholder:'Mazda3 XD',value:vF.name,onChange:function(e){setVF(function(p){return assign({},p,{name:e.target.value});})}})),
                h('div',null,h('label',{style:S.lbl},'年式'),h('input',{style:S.inp,placeholder:'2019',value:vF.year,onChange:function(e){setVF(function(p){return assign({},p,{year:e.target.value});})}}))
              ),
              h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}},
                h('div',null,
                  h('label',{style:S.lbl},'基準走行距離 (km)'),
                  h('div',{style:{fontSize:11,color:'var(--text3)',marginBottom:7,lineHeight:1.5}},'現在値: '+fmt(cur)+' km（記録から自動計算）'),
                  h('input',{type:'number',style:S.inp,inputMode:'numeric',value:vF.mileage,
                    onChange:function(e){setVF(function(p){return assign({},p,{mileage:+e.target.value});});}})
                ),
                h('div',null,h('label',{style:S.lbl},'燃料種別'),
                  h('select',{style:assign(S.inp,{cursor:'pointer'}),value:vF.fuelType,onChange:function(e){setVF(function(p){return assign({},p,{fuelType:e.target.value});});}},
                    ['レギュラー','ハイオク','軽油','電気'].map(function(f){return h('option',{key:f,value:f},f);})
                  )
                )
              ),
              h('button',{className:'btn-primary',style:assign(S.bP,{justifyContent:'center'}),onClick:saveVehicle},'車両情報を保存')
            ),
            h('div',{style:{fontSize:11,color:'var(--text3)',fontWeight:600,textTransform:'uppercase',letterSpacing:'.7px',marginBottom:14}},'データ管理'),
            h('div',{style:{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:16,overflow:'hidden'}},
              h('div',{className:'srow'},
                h('div',null,
                  h('div',{style:{fontSize:13,fontWeight:600,letterSpacing:'-.2px'}},'JSONエクスポート'),
                  h('div',{style:{fontSize:11,color:'var(--text3)',marginTop:3}},'全データをバックアップ')),
                h('button',{onClick:doExport,style:assign(S.bG,{display:'flex',alignItems:'center',gap:6,fontSize:12,padding:'8px 14px'})},h(Ico,{name:'download',size:13}),'エクスポート')
              ),
              h('div',{className:'srow'},
                h('div',null,
                  h('div',{style:{fontSize:13,fontWeight:600,letterSpacing:'-.2px'}},'JSONインポート'),
                  h('div',{style:{fontSize:11,color:'var(--text3)',marginTop:3}},'バックアップから復元')),
                h('button',{onClick:function(){iref.current&&iref.current.click();},style:assign(S.bG,{display:'flex',alignItems:'center',gap:6,fontSize:12,padding:'8px 14px'})},h(Ico,{name:'upload',size:13}),'インポート')
              )
            ),
            h('input',{ref:iref,type:'file',accept:'.json',style:{display:'none'},onChange:doImport}),
            impErr ? h('div',{style:{fontSize:12,color:'#fb7185',background:'rgba(244,63,94,.06)',border:'1px solid rgba(244,63,94,.15)',borderRadius:10,padding:'10px 14px',marginTop:10}},impErr) : null,
            h('div',{style:{fontSize:11,color:'var(--text3)',fontWeight:600,textTransform:'uppercase',letterSpacing:'.7px',marginBottom:14,marginTop:24}},'通知設定'),
            h('div',{style:{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:16,overflow:'hidden'}},
              h('div',{className:'srow'},
                h('div',null,
                  h('div',{style:{fontSize:13,fontWeight:600,letterSpacing:'-.2px'}},'ブラウザ通知'),
                  h('div',{style:{fontSize:11,color:'var(--text3)',marginTop:3}},
                    notifPerm==='granted' ? '許可済み ✓' :
                    notifPerm==='denied'  ? 'ブラウザ設定から許可してください' : '未許可'
                  )
                ),
                notifPerm!=='granted'
                  ? h('button',{
                      onClick:function(){
                        if(!('Notification' in window)) return;
                        Notification.requestPermission().then(function(p){ setNotifPerm(p); });
                      },
                      disabled:notifPerm==='denied',
                      style:assign(S.bG,{display:'flex',alignItems:'center',gap:6,fontSize:12,padding:'8px 14px',opacity:notifPerm==='denied'?.4:1})
                    }, h(Ico,{name:'bell',size:13}), '通知を許可')
                  : h('button',{
                      onClick:function(){ setNotifSetting(function(p){return assign({},p,{enabled:!p.enabled});}); },
                      style:{width:44,height:24,borderRadius:12,border:'none',cursor:'pointer',
                        background:notifSetting.enabled?'var(--amber)':'var(--surface3)',
                        transition:'background .2s',position:'relative',flexShrink:0}
                    },
                      h('div',{style:{width:18,height:18,borderRadius:9,background:'#fff',position:'absolute',
                        top:3,transition:'left .2s',left:notifSetting.enabled?'23px':'3px'}})
                    )
              ),
              notifPerm==='granted' && notifSetting.enabled
                ? h('div',{className:'srow'},
                    h('div',null,
                      h('div',{style:{fontSize:13,fontWeight:600,letterSpacing:'-.2px'}},'通知タイミング'),
                      h('div',{style:{fontSize:11,color:'var(--text3)',marginTop:3}},'残り距離・日数での通知しきい値')
                    ),
                    h('select',{
                      style:assign(S.inp,{width:'auto',cursor:'pointer',padding:'7px 10px',fontSize:12}),
                      value:String(notifSetting.timing||1000),
                      onChange:function(e){
                        var v=+e.target.value;
                        var dayMap={1000:30,2000:60,3000:90};
                        setNotifSetting(function(p){return assign({},p,{timing:v,timingDay:dayMap[v]||30});});
                      }
                    },
                      h('option',{value:'1000'},'残 1,000km / 30日'),
                      h('option',{value:'2000'},'残 2,000km / 60日'),
                      h('option',{value:'3000'},'残 3,000km / 90日')
                    )
                  )
                : null
            ),
            notifPerm==='granted' && notifSetting.enabled
              ? h('div',{style:{fontSize:11,color:'var(--text3)',marginTop:8,padding:'0 4px',lineHeight:1.6}},'アプリを開いたとき（1日1回）、対応が必要なリマインダーを通知します。')
              : null,
            h('div',{style:{marginTop:20,padding:'12px 0',borderTop:'1px solid var(--border2)',display:'flex',justifyContent:'space-between',alignItems:'center'}},
              h('div',{className:'stat-num',style:{fontSize:11,color:'var(--text3)'}},'CarLog v5 · PWA'),
              h('div',{className:'stat-num',style:{fontSize:11,color:'var(--text3)'}},'メンテ '+maint.length+'件 · 給油 '+fuel.length+'件')
            )
          ) : null
        )
      ) : null
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(h(App));

})();
</script>

<script>
if('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js')
      .then(function(){ console.log('SW ok'); })
      .catch(function(e){ console.warn('SW:', e); });
  });
}
</script>
</body>
